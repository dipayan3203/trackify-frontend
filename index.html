<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trackify Dashboard</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/glassmorphism.css" />
    <link rel="stylesheet" href="css/animations.css" />
</head>
<body>
    <!-- Navigation -->
    <nav class="glass-nav">
        <div class="nav-container">
            <div class="nav-brand">
                <i class="fas fa-rocket"></i>
                <span>Trackify</span>
            </div>
            <div class="nav-status">
                <span class="status-indicator" id="connectionStatus">
                    <i class="fas fa-circle"></i> Connecting...
                </span>
                <span class="latency-badge" id="latencyDisplay">
                    <i class="fas fa-clock"></i> <span id="latencyValue">--</span>ms
                </span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="dashboard-container">
        <!-- Hero Section -->
        <section class="hero-section glass-card animate-slide-up">
            <div class="hero-content">
                <h1 class="hero-title">
                    <span class="gradient-text">Welcome to Trackify</span>
                </h1>
                <p class="hero-subtitle">Real-time analytics dashboard with glassmorphism design</p>
                <div class="hero-stats">
                    <div class="stat-item">
                        <span class="stat-number" id="totalRequests">0</span>
                        <span class="stat-label">Total Requests</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" id="activeUsers">0</span>
                        <span class="stat-label">Active Users</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" id="responseTime">0ms</span>
                        <span class="stat-label">Avg Response</span>
                    </div>
                </div>
            </div>
            <div class="hero-graphic">
                <div class="floating-shapes">
                    <div class="shape shape-1"></div>
                    <div class="shape shape-2"></div>
                    <div class="shape shape-3"></div>
                </div>
            </div>
        </section>

        <section class="dashboard
