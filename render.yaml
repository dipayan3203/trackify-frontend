services:
  - type: static
    name: trackify-frontend
    env: static
    buildCommand: |
      echo "No build required - static site"
    staticPublishPath: ./
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
